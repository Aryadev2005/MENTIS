version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: mentis_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: mentis
      POSTGRES_USER: mentis_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mentis_dev_password}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=en_US.UTF-8 --lc-ctype=en_US.UTF-8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/01_init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mentis_user -d mentis"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - mentis_network

  redis:
    image: redis:7-alpine
    container_name: mentis_redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-mentis_redis_dev}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 60 1000
      --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-mentis_redis_dev}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mentis_network

  qdrant:
    image: qdrant/qdrant:latest
    container_name: mentis_qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY:-mentis_qdrant_dev}
      QDRANT__SERVICE__ENABLE_TLS: "false"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6333/healthz || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - mentis_network

  prometheus:
    image: prom/prometheus:latest
    container_name: mentis_prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
    networks:
      - mentis_network
    profiles:
      - monitoring

  grafana:
    image: grafana/grafana:latest
    container_name: mentis_grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-mentis_grafana_dev}
      GF_USERS_ALLOW_SIGN_UP: "false"
    networks:
      - mentis_network
    profiles:
      - monitoring

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  qdrant_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  mentis_network:
    driver: bridge
    name: mentis_network
